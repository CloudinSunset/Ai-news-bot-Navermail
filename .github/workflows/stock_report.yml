name: Daily Stock & Industry News Report

on:
  # 수동으로 원할 때만 실행할 수 있도록 해주는 옵션입니다.
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 저장소 체크아웃
      uses: actions/checkout@v3

    - name: Python 환경 설정 (3.10)
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 필수 라이브러리 설치
      run: |
        python -m pip install --upgrade pip
        pip install requests google-genai

    - name: 주식 리포트 파이썬 스크립트 실행
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        NAVER_ID: ${{ secrets.NAVER_ID }}
        NAVER_APP_PW: ${{ secrets.NAVER_APP_PW }}
        RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
      run: |
        python stock_main.py
