name: Manual AI News Report

on:
  workflow_dispatch: # ⭐ 내가 깃허브 홈페이지에서 버튼을 누를 때만 실행됨!

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-genai requests

      - name: Run manual script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          NAVER_ID: ${{ secrets.NAVER_ID }}
          NAVER_APP_PW: ${{ secrets.NAVER_APP_PW }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          TZ: 'Asia/Seoul'
        # ⭐ 기존 main.py가 아니라 수동 코드를 실행하도록 지정
        run: python manual_main.py
